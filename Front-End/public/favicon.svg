<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Rich amber-to-brown gradient for the background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="50%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <!-- Warm gold shimmer for the letter -->
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="35%" stop-color="#fbbf24"/>
      <stop offset="65%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border highlight -->
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="#d97706" stroke-width="2" opacity="0.25"/>

  <!-- Letter B — elegant serif style -->
  <text
    x="256"
    y="395"
    text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-weight="700"
    font-size="420"
    fill="url(#letter)"
    filter="url(#glow)"
    letter-spacing="-10"
  >B</text>
</svg>
