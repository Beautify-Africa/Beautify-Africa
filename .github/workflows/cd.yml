name: CD

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Publish Docker Images To GHCR
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare image tags
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-12)
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Back-End
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/beautify-africa-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/beautify-africa-backend:${{ env.SHORT_SHA }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Front-End
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/beautify-africa-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/beautify-africa-frontend:${{ env.SHORT_SHA }}
