name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Back-End Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back-End
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Back-End/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  frontend-quality:
    name: Front-End Lint And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front-End
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Front-End/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
